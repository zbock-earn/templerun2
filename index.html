<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Temple Run 2 - Shielded Edition</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        id="game-frame"
        sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-forms"
        srcdoc='
            <!DOCTYPE html>
            <html>
            <head>
                <link rel="stylesheet" href="global.css">
                <style>
                    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
                    #game-container { width: 100%; height: 100%; }
                </style>
                <script>
                    // Fake Poki SDK structure inside the container
                    window.PokiSDK = {
                        init: function() { return new Promise((r) => r(true)); },
                        gameLoadingStart: function() {},
                        gameLoadingProgress: function() {},
                        gameLoadingFinished: function() {},
                        gameplayStart: function() {},
                        gameplayStop: function() {},
                        commercialBreak: function() { return new Promise((r) => r(true)); },
                        rewardedBreak: function() { return new Promise((r) => r(true)); }
                    };
                    window.updateProgress = function(p) {};
                </script>
            </head>
            <body>
                <div id="game-container"></div>
                <script src="772.bundle.js"></script>
                <script src="bundle.js"></script>
            </body>
            </html>
        '>
    </iframe>

</body>
</html>
