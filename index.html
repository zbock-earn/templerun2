<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Temple Run 2 - Clean Live Fix v4</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        // ========================================================
        // 1. THE ULTIMATE NETWORK INTERCEPTOR & REDIRECT DESTROYER
        // ========================================================
        
        // Kisi bhi tareeqe ki redirection tabeer karne se browser ko sakhti se rokna
        window.onbeforeunload = function() { return "Redirection Blocked"; };

        // 🟢 LAYER A: Network interceptor for fetch API
        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            const url = args[0] ? args[0].toString() : "";
            // Agar Poki ki internal ad, sitelock checking ya metrics requests hoon toh unhein fake response do
            if (url.includes('poki.com') || url.includes('sitelock')) {
                console.log("🛡️ Intercepted Poki Fetch Request:", url);
                return new Response(JSON.stringify({ sitelock: false, allowed: true, status: "ok" }), {
                    status: 200,
                    headers: { 'Content-Type': 'application/json' }
                });
            }
            return originalFetch.apply(this, args);
        };

        // 🟢 LAYER B: Network interceptor for XMLHttpRequest (XHR)
        const originalXHR = window.XMLHttpRequest.prototype.open;
        window.XMLHttpRequest.prototype.open = function(method, url, ...rest) {
            if (url.includes('poki.com') || url.includes('sitelock')) {
                console.log("🛡️ Intercepted Poki XHR Request:", url);
                // Request ko fake local destination par mod dena taake error na aaye aur block bhi ho jaye
                url = "data:application/json,{\"sitelock\":false,\"allowed\":true}";
            }
            return originalXHR.apply(this, [method, url, ...rest]);
        };

        // 🟢 LAYER C: Navigation Properties Freeze
        try {
            window.location.assign = function() { return false; };
            window.location.replace = function() { return false; };
            window.open = function() { return null; };

            const locationShield = {
                get: function(target, prop) {
                    if (prop === 'host' || prop === 'hostname') return 'poki.com';
                    if (prop === 'origin') return 'https://poki.com';
                    if (prop === 'href') return 'https://poki.com/en/g/temple-run-2';
                    return target[prop];
                },
                set: function(target, prop, value) {
                    console.warn("🛡️ Poki Navigation Attempt Terminated:", value);
                    return true; 
                }
            };

            window.location = new Proxy(window.location, locationShield);
            document.location = new Proxy(document.location, locationShield);
            
            Object.defineProperty(window, 'top', { get: function() { return window; } });
            Object.defineProperty(window, 'parent', { get: function() { return window; } });
            Object.defineProperty(window, 'self', { get: function() { return window; } });
        } catch (e) {
            console.log("Shield active");
        }

        Object.defineProperty(document, 'referrer', {
            get: function() { return 'https://poki.com/'; },
            configurable: true
        });

        // ========================================================
        // 2. GLOBAL GAME FUNCTIONS & POKI SDK EMULATOR
        // ========================================================

        window.updateProgress = function(progress) {
            console.log("Global Loading Progress: ", progress);
        };

        window.PokiSDK = {
            init: function() {
                return new Promise((resolve) => {
                    console.log("Offline Poki SDK Initialized");
                    resolve(true);
                });
            },
            gameLoadingStart: function() { console.log("Game Loading Started..."); },
            gameLoadingProgress: function(progress) { console.log("Loading Progress: ", progress); },
            gameLoadingFinished: function() { console.log("Game Loading Finished!"); },
            gameplayStart: function() { console.log("Local Gameplay Started"); },
            gameplayStop: function() { console.log("Local Gameplay Stopped"); },
            commercialBreak: function() { return new Promise((r) => r(true)); },
            rewardedBreak: function() { return new Promise((r) => r(true)); }
        };

        Object.defineProperty(window, 'PokiSDK', { writable: false, configurable: false });
    </script>
</head>
<body>

    <div id="game-container"></div>

    <script src="772.bundle.js"></script>
    <script src="bundle.js"></script>

</body>
</html>
