<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Temple Run 2 - Clean GitHub Live Fix</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        // ========================================================
        // 1. ULTIMATE NATIVE FUNCTION FREEZER (Anti-Sitelock)
        // ========================================================
        
        // Agar code obfuscated (encrypted) bhi ho, toh bhi wo redirect karne ke liye
        // window.location.replace, window.location.assign ya window.open hi use karega.
        // Hum un methods ke asal kaam ko hi permanently block kar rahe hain.
        
        try {
            // Navigation functions ko khali (dummy) banana
            window.location.assign = function() { return false; };
            window.location.replace = function() { return false; };
            window.open = function() { return null; };
            
            // Core location prototype properties ko tight bind karna
            const fakeLoc = {};
            const props = ['href', 'host', 'hostname', 'origin', 'pathname', 'search', 'hash'];
            
            props.forEach(prop => {
                Object.defineProperty(fakeLoc, prop, {
                    get: function() {
                        if (prop === 'host' || prop === 'hostname') return 'poki.com';
                        if (prop === 'origin') return 'https://poki.com';
                        if (prop === 'href') return 'https://poki.com/en/g/temple-run-2';
                        return window.location[prop];
                    },
                    set: function(val) {
                        console.log("Blocked encrypted redirect attempt to:", val);
                        return true; // Script samajhti rahegi kaam ho gaya par page nahi hilega
                    }
                });
            });

            // Window level par location ko proxy wrap karna
            Object.defineProperty(window, 'location', {
                value: new Proxy(window.location, {
                    get: (t, p) => fakeLoc[p] !== undefined ? fakeLoc[p] : t[p],
                    set: (t, p, v) => { fakeLoc[p] = v; return true; }
                }),
                configurable: true
            });
        } catch (e) {
            console.log("Anti-Redirect Shield Active");
        }

        // Frame and Referrer Security Layers
        window.top = window;
        window.parent = window;
        window.self = window;

        Object.defineProperty(document, 'referrer', {
            get: function() { return 'https://poki.com/'; },
            configurable: true
        });

        // ========================================================
        // 2. GLOBAL GAME FUNCTIONS & POKI SDK EMULATOR
        // ========================================================

        window.updateProgress = function(progress) {
            console.log("Global Loading Progress: ", progress);
        };

        window.PokiSDK = {
            init: function() {
                return new Promise((resolve) => {
                    console.log("Offline Poki SDK Initialized");
                    resolve(true);
                });
            },
            gameLoadingStart: function() { console.log("Game Loading Started..."); },
            gameLoadingProgress: function(progress) { console.log("Loading Progress: ", progress); },
            gameLoadingFinished: function() { console.log("Game Loading Finished!"); },
            gameplayStart: function() { console.log("Local Gameplay Started"); },
            gameplayStop: function() { console.log("Local Gameplay Stopped"); },
            commercialBreak: function() { return new Promise((r) => r(true)); },
            rewardedBreak: function() { return new Promise((r) => r(true)); }
        };

        Object.defineProperty(window, 'PokiSDK', { writable: false, configurable: false });
    </script>
</head>
<body>

    <div id="game-container"></div>

    <script src="772.bundle.js"></script>
    <script src="bundle.js"></script>

</body>
</html>
