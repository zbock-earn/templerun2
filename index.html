<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Temple Run 2 - Clean GitHub Live</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        // ========================================================
        // 1. ADVANCED DOMAIN & NAVIGATION FREEZER
        // ========================================================
        
        // Kisi bhi kism ke location.replace ya location.assign redirect ko permanently neutralise karna
        try {
            window.location.assign = function(url) { return false; };
            window.location.replace = function(url) { return false; };
            
            // Location properties ko tightly wrap karna taake scripts ko hamesha poki.com nazar aaye
            const proxyLocation = new Proxy(window.location, {
                get: function(target, prop) {
                    if (prop === 'host' || prop === 'hostname') return 'poki.com';
                    if (prop === 'origin') return 'https://poki.com';
                    if (prop === 'href') return 'https://poki.com/en/g/temple-run-2';
                    return target[prop];
                },
                set: function(target, prop, val) {
                    // Agar script khud se redirect karne ke liye href set kare, toh bypass kar do
                    if (prop === 'href' || val.includes('sitelock')) return true;
                    target[prop] = val;
                    return true;
                }
            });

            Object.defineProperty(window, 'location', { value: proxyLocation, configurable: true, writable: false });
            Object.defineProperty(document, 'location', { value: proxyLocation, configurable: true, writable: false });
        } catch (e) {
            console.log("Navigation freeze active");
        }

        // Frame hijacking aur window environment safety layers
        window.top = window;
        window.parent = window;
        window.self = window;

        // Document Referrer header ko force-mock karna
        Object.defineProperty(document, 'referrer', {
            get: function() { return 'https://poki.com/'; },
            configurable: true
        });

        // ========================================================
        // 2. GLOBAL GAME FUNCTIONS & POKI SDK EMULATOR
        // ========================================================

        window.updateProgress = function(progress) {
            console.log("Global Loading Progress: ", progress);
        };

        window.PokiSDK = {
            init: function() {
                return new Promise((resolve) => {
                    console.log("Offline Poki SDK Initialized");
                    resolve(true);
                });
            },
            gameLoadingStart: function() { console.log("Game Loading Started..."); },
            gameLoadingProgress: function(progress) { console.log("Loading Progress: ", progress); },
            gameLoadingFinished: function() { console.log("Game Loading Finished!"); },
            gameplayStart: function() { console.log("Local Gameplay Started"); },
            gameplayStop: function() { console.log("Local Gameplay Stopped"); },
            commercialBreak: function() { return new Promise((r) => r(true)); },
            rewardedBreak: function() { return new Promise((r) => r(true)); }
        };

        // PokiSDK variable ko lock karna taake game code isko badal na sakay
        Object.defineProperty(window, 'PokiSDK', { writable: false, configurable: false });
    </script>
</head>
<body>

    <div id="game-container"></div>

    <script src="772.bundle.js"></script>
    <script src="bundle.js"></script>

</body>
</html>
