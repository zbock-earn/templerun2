<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Temple Run 2 - Perfect GitHub Live Fix</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        // ========================================================
        // 1. CSP, EVAL, AND OBFUSCATED REDIRECT BREAKER
        // ========================================================
        
        // Console 'Issues' ko neutralize karna. Agar obfuscated code 'eval' use kare, 
        // hum use browser console ko report karne se pehle hi freeze kar dein ge.
        window.eval = function(s) {
            console.log("CSP Block: Blocked obfuscated code execution via eval.");
            return undefined; // Kuch bhi execute mat hone do
        };
        
        // Navigation freeze commands taake redirect permanent block ho
        try {
            window.location.assign = function() { return false; };
            window.location.replace = function() { return false; };
            window.open = function() { return null; };
            
            // Core location proxy taake encoded redirection prevent ho
            const realLocation = window.location;
            const fakeLocation = {};
            const props = ['href', 'host', 'hostname', 'origin'];
            
            props.forEach(prop => {
                Object.defineProperty(fakeLocation, prop, {
                    get: function() {
                        if (prop === 'host' || prop === 'hostname') return 'poki.com';
                        if (prop === 'origin') return 'https://poki.com';
                        return realLocation[prop];
                    },
                    set: function(val) {
                        console.log("Blocked encrypted or direct redirect attempt to:", val);
                        return true; 
                    }
                });
            });

            Object.defineProperty(window, 'location', { value: fakeLocation, configurable: true, writable: false });
        } catch (e) {
            console.log("Anti-Redirect Shield Active (Post-CSP Fix)");
        }

        // Frame and Referrer Security Layers
        window.top = window;
        window.parent = window;
        window.self = window;

        Object.defineProperty(document, 'referrer', {
            get: function() { return 'https://poki.com/'; },
            configurable: true
        });

        // ========================================================
        // 2. GLOBAL GAME FUNCTIONS & POKI SDK EMULATOR
        // ========================================================

        window.updateProgress = function(progress) {
            console.log("Global Loading Progress: ", progress);
        };

        window.PokiSDK = {
            init: function() {
                return new Promise((resolve) => {
                    console.log("Offline Poki SDK Initialized (Strict Emulator)");
                    resolve(true);
                });
            },
            gameLoadingStart: function() { console.log("Game Loading Started..."); },
            gameLoadingProgress: function(progress) { console.log("Loading Progress: ", progress); },
            gameLoadingFinished: function() { console.log("Game Loading Finished!"); },
            gameplayStart: function() { console.log("Local Gameplay Started"); },
            gameplayStop: function() { console.log("Local Gameplay Stopped"); },
            commercialBreak: function() { return new Promise((r) => r(true)); },
            rewardedBreak: function() { return new Promise((r) => r(true)); }
        };

        Object.defineProperty(window, 'PokiSDK', { writable: false, configurable: false });
    </script>
</head>
<body>

    <div id="game-container"></div>

    <script src="772.bundle.js"></script>
    <script src="bundle.js"></script>

</body>
</html>
