<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Temple Run 2 - Ultimate GitHub Fix</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        // ========================================================
        // 1. HARD NAVIGATION FREEZER (Anti-Hex & Anti-Obfuscation)
        // ========================================================
        
        // Browser ko page tabdeel karne se sakhti se rokna
        window.onbeforeunload = function() { return "Redirection Blocked"; };

        try {
            // Location methods ko permanently crash kar dena taake redirect trigger hi na ho
            window.location.assign = function() { return false; };
            window.location.replace = function() { return false; };
            window.open = function() { return null; };

            // Pure window environment mein 'top', 'parent' aur 'self' ko freeze karna
            // Is se unka code frame break karke baahar nahi nikal sakega
            Object.defineProperty(window, 'top', { get: function() { return window; }, configurable: false });
            Object.defineProperty(window, 'parent', { get: function() { return window; }, configurable: false });
            Object.defineProperty(window, 'self', { get: function() { return window; }, configurable: false });

            // Location object ki values ko object level par mock karna
            const locationMock = {};
            const keys = ['href', 'host', 'hostname', 'origin', 'pathname'];
            
            keys.forEach(key => {
                Object.defineProperty(locationMock, key, {
                    get: function() {
                        if (key === 'host' || key === 'hostname') return 'poki.com';
                        if (key === 'origin') return 'https://poki.com';
                        if (key === 'href') return 'https://poki.com/en/g/temple-run-2';
                        return window.location[key];
                    },
                    set: function(val) {
                        console.warn("🛡️ Encodded Redirect Blocked:", val);
                        return true; 
                    }
                });
            });

            // Window ki apni location property ko completely overwrite aur lock karna
            Object.defineProperty(window, 'location', {
                value: locationMock,
                writable: false,
                configurable: false
            });
            
        } catch (e) {
            console.log("Nuclear shield active");
        }

        // Referrer header spoofing
        Object.defineProperty(document, 'referrer', {
            get: function() { return 'https://poki.com/'; },
            configurable: true
        });

        // ========================================================
        // 2. GLOBAL GAME FUNCTIONS & POKI SDK EMULATOR
        // ========================================================

        window.updateProgress = function(progress) {
            console.log("Global Loading Progress: ", progress);
        };

        window.PokiSDK = {
            init: function() {
                return new Promise((resolve) => {
                    console.log("Offline Poki SDK Initialized");
                    resolve(true);
                });
            },
            gameLoadingStart: function() { console.log("Game Loading Started..."); },
            gameLoadingProgress: function(progress) { console.log("Loading Progress: ", progress); },
            gameLoadingFinished: function() { console.log("Game Loading Finished!"); },
            gameplayStart: function() { console.log("Local Gameplay Started"); },
            gameplayStop: function() { console.log("Local Gameplay Stopped"); },
            commercialBreak: function() { return new Promise((r) => r(true)); },
            rewardedBreak: function() { return new Promise((r) => r(true)); }
        };

        Object.defineProperty(window, 'PokiSDK', { writable: false, configurable: false });
    </script>
</head>
<body>

    <div id="game-container"></div>

    <script src="772.bundle.js"></script>
    <script src="bundle.js"></script>

</body>
</html>
